name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check HTML validity
        run: npx html-validate "*.html"

      - name: Check JavaScript syntax
        run: npx eslint js/**/*.js --no-eslintrc --rule '{"no-undef":"warn","no-unused-vars":"warn"}'

      - name: Check CSS validity
        run: npx stylelint "css/**/*.css"

  test:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run tests
        working-directory: ./backend
        run: npm test
        env:
          NODE_ENV: test
          MONGO_URI: mongodb://localhost:27017/skillpilot-test
          JWT_SECRET: test-jwt-secret-for-ci
          CORS_ORIGIN: '*'

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build

  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            https://skillpilot.vercel.app/login.html
            https://skillpilot.vercel.app/index.html
            https://skillpilot.vercel.app/resume-analyzer.html
          uploadArtifacts: true
          temporaryPublicStorage: true
