<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — SkillPilot AI</title>
  <meta name="description" content="Reset your SkillPilot AI account password.">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#4F46E5">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
  <style>
    .reset-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .reset-card { background: var(--card-bg); border-radius: var(--radius-lg); padding: 3rem; width: 100%; max-width: 440px; border: 1px solid var(--border); box-shadow: var(--shadow-lg); }
    .reset-card h1 { font-size: 1.75rem; margin-bottom: 0.5rem; }
    .reset-card p { color: var(--text-secondary); margin-bottom: 2rem; font-size: 0.95rem; }
    .reset-card .form-group { margin-bottom: 1.25rem; }
    .reset-card label { display: block; font-size: 0.9rem; font-weight: 500; margin-bottom: 0.4rem; }
    .reset-card input { width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: var(--radius-md); background: var(--bg); color: var(--text); font-size: 0.95rem; transition: border-color 0.2s; }
    .reset-card input:focus { outline: none; border-color: var(--primary); }
    .reset-card .btn { width: 100%; padding: 0.85rem; font-size: 1rem; margin-top: 0.5rem; }
    .reset-card .success-msg { text-align: center; padding: 2rem 0; }
    .reset-card .success-msg i { font-size: 3rem; color: var(--success); margin-bottom: 1rem; }
    .reset-card .error-msg { color: var(--error); font-size: 0.85rem; margin-top: 0.3rem; }
  </style>
</head>
<body>
  <div class="reset-container">
    <div class="reset-card" id="reset-card">
      <div id="reset-phase">
        <h1>Set new password</h1>
        <p>Enter your new password below.</p>
        <div class="form-group">
          <label for="new-password">New Password</label>
          <input type="password" id="new-password" placeholder="At least 6 characters" minlength="6" required>
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" placeholder="Repeat your password" required>
        </div>
        <div id="reset-error" class="error-msg" style="display:none"></div>
        <button class="btn btn-primary" id="reset-btn" onclick="submitReset()">Reset Password</button>
      </div>
      <div id="success-phase" style="display:none">
        <div class="success-msg">
          <i class="fa-solid fa-check-circle"></i>
          <h2>Password reset successful!</h2>
          <p style="margin-bottom:1.5rem">You can now log in with your new password.</p>
          <a href="/login.html" class="btn btn-primary">Go to Login</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    function getToken () {
      var params = new URLSearchParams(window.location.search)
      return params.get('token')
    }

    async function submitReset () {
      var password = document.getElementById('new-password').value
      var confirm = document.getElementById('confirm-password').value
      var errorEl = document.getElementById('reset-error')

      if (!password || password.length < 6) {
        errorEl.textContent = 'Password must be at least 6 characters'
        errorEl.style.display = 'block'
        return
      }
      if (password !== confirm) {
        errorEl.textContent = 'Passwords do not match'
        errorEl.style.display = 'block'
        return
      }

      var token = getToken()
      if (!token) {
        errorEl.textContent = 'Invalid or missing reset token'
        errorEl.style.display = 'block'
        return
      }

      errorEl.style.display = 'none'
      document.getElementById('reset-btn').disabled = true
      document.getElementById('reset-btn').textContent = 'Resetting...'

      try {
        var res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: token, password: password }),
        })
        var data = await res.json()
        if (res.ok && data.data) {
          document.getElementById('reset-phase').style.display = 'none'
          document.getElementById('success-phase').style.display = 'block'
        } else {
          errorEl.textContent = data.error || 'Reset failed. Try again.'
          errorEl.style.display = 'block'
          document.getElementById('reset-btn').disabled = false
          document.getElementById('reset-btn').textContent = 'Reset Password'
        }
      } catch (e) {
        errorEl.textContent = 'Network error. Please try again.'
        errorEl.style.display = 'block'
        document.getElementById('reset-btn').disabled = false
        document.getElementById('reset-btn').textContent = 'Reset Password'
      }
    }

    (function () {
      if (!getToken()) {
        document.getElementById('reset-error').textContent = 'Invalid or missing reset token'
        document.getElementById('reset-error').style.display = 'block'
      }
    })()
  </script>
</body>
</html>
